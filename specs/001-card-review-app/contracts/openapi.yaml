        status:
          type: string
          enum: [draft, active, paused, completed, archived]
        startDate:
          type: string
          format: date
        targetCompletionDate:
          type: string
          format: date
        dailyCapacity:
          type: integer
        deckIds:
          type: array
          items:
            type: string
