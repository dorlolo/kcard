        explanation:
          type: string
        learnerNotes:
          type: string
        status:
          type: string
          enum: [draft, active, archived, deleted]
        reviewStatus:
          type: string
          enum: [new, learning, due, not_due, suspended]
        difficulty:
          type: string
          enum: [unrated, easy, medium, hard]
        deckIds:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'

    CreateCardRequest:
      type: object
      required: [frontPrompt, backAnswer]
      properties:
        frontPrompt:
          type: string
        backAnswer:
          type: string
        explanation:
          type: string
        learnerNotes:
          type: string
        deckIds:
          type: array
          items:
            type: string
        tagIds:
          type: array
          items:
            type: string

    UpdateCardRequest:
      type: object
      properties:
        frontPrompt:
          type: string
        backAnswer:
          type: string
        explanation:
          type: string
        learnerNotes:
          type: string
        status:
          type: string
          enum: [draft, active, archived, deleted]
        difficulty:
          type: string
          enum: [unrated, easy, medium, hard]
        deckIds:
          type: array
          items:
            type: string
        tagIds:
          type: array
          items:
            type: string

    StartReviewSessionRequest:
      type: object
      required: [sessionType]
      properties:
        sessionType:
          type: string
          enum: [direct, plan_based]
        deckId:
          type: string
        planId:
          type: string
        dueOnly:
          type: boolean
          default: false
        maxCards:
          type: integer

    ReviewSession:
      type: object
      required: [id, sessionType, status, cardsRemaining]
      properties:
        id:
          type: string
        sessionType:
          type: string
          enum: [direct, plan_based]
        status:
          type: string
          enum: [active, paused, completed, abandoned]
        cardsRemaining:
          type: integer
        summary:
          type: string

    RecordReviewAnswerRequest:
      type: object
      required: [cardId, result, elapsedResponseMs]
      properties:
        cardId:
          type: string
        result:
          type: string
          enum: [again, hard, good, easy, correct, incorrect]
        confidence:
          type: integer
          minimum: 1
          maximum: 5
        elapsedResponseMs:
          type: integer

    ReviewResult:
      type: object
      required: [id, cardId, result, nextDueAt]
      properties:
        id:
          type: string
        cardId:
          type: string
        result:
          type: string
        nextDueAt:
          type: string
          format: date-time
        scheduleReason:
          type: string

    UpdateReviewSessionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [pause, resume, complete, abandon]

    CreatePlanRequest:
      type: object
      required: [name, deckIds, startDate, targetCompletionDate, dailyCapacity]
      properties:
        name:
          type: string
        goal:
          type: string
        deckIds:
          type: array
          items:
            type: string
        startDate:
          type: string
          format: date
        targetCompletionDate:
          type: string
          format: date
        dailyCapacity:
          type: integer
        overlapPolicy:
          type: string
          enum: [prevent, allow_with_warning]
          default: prevent

    GeneratePlanRequest:
      allOf:
        - $ref: '#/components/schemas/CreatePlanRequest'
        - type: object
          required: [promptText]
          properties:
            promptPresetId:
              type: string
            promptText:
              type: string

    UpdatePlanRequest:
      type: object
      properties:
        name:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [active, paused, completed, archived]
        dailyCapacity:
          type: integer
        targetCompletionDate:
          type: string
          format: date

    OptimizePlanRequest:
      type: object
      required: [mode]
