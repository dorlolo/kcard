          type: string
        createdAt:
          type: string
          format: date-time

    ReviewStatistics:
      type: object
      required: [scopeType, cardsReviewed, recallRate, overdueCount, weakAreas]
      properties:
        scopeType:
          type: string
        scopeId:
          type: string
        cardsReviewed:
          type: integer
        recallRate:
          type: number
        overdueCount:
          type: integer
        completionRate:
          type: number
        weakAreas:
          type: array
          items:
            type: object
            required: [label, score]
            properties:
              label:
                type: string
              score:
                type: number

    DashboardSummary:
      type: object
      required: [draftsNeedingApproval, dueReviews, overdueReviews, activePlans, weakAreas, nextActions]
      properties:
        draftsNeedingApproval:
          type: integer
        dueReviews:
          type: integer
        overdueReviews:
          type: integer
        activePlans:
          type: integer
        weakAreas:
          type: array
          items:
            type: string
        nextActions:
          type: array
          items:
            type: object
            required: [type, label]
            properties:
              type:
                type: string
              label:
                type: string
              targetId:
                type: string

    CreateExportRequest:
      type: object
      required: [includedContent]
      properties:
        includedContent:
          type: array
          items:
            type: string
            enum: [materials, knowledge_points, prompts, decks, cards, review_plans, review_history, statistics]

    ImportWorkspaceRequest:
      type: object
      required: [fileToken, mode]
      properties:
